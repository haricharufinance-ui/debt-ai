name: debtzero_ai
description: AI-powered liability reduction and debt management app.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management - simple ChangeNotifier + Provider, no backend needed yet
  provider: ^6.1.2

  # Local file storage (JSON file in app documents dir).
  # Swap-to-DB-later plan: replace StorageService's read/write with
  # sqlite (sqflite) or remote API calls; AppState/UI code does not change.
  path_provider: ^2.1.3

  # Runtime permissions (SMS, notifications)
  permission_handler: ^11.3.1

  # SMS reading (inbox scan) + live incoming SMS listener.
  # Android-only package - matches "Android-first" requirement.
  another_telephony: ^0.5.0

  # Date formatting
  intl: ^0.19.0

  # Unique ids for liabilities/transactions stored locally
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
