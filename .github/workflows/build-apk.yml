name: Build Android APK

# Builds a debug APK on every push to main, and lets you trigger it manually.
# You don't need Flutter, Android Studio, or any SDK installed on your own
# machine for this - GitHub's runner has it all. You just need a GitHub
# account and to push this folder to a repo.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Fills in the standard Android scaffolding (Gradle wrapper,
      # MainActivity, etc.) without touching the files already in the repo.
      - name: Ensure platform folders exist
        run: flutter create . --platforms=android

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: debtzero-ai-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
